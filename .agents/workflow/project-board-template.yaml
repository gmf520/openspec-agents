# 变更看板模板
# 每个变更在 openspec/changes/<change-name>/session/project-board.yaml 维护自己的看板
# 本文件为模板参考，新变更从此复制初始结构

version: "1.0"

# 当前变更的活跃看板
# 每个变更在 session 目录下维护独立看板，不在此公共区域
active_changes: []

# 已完成的变更历史
completed_changes: []

# 变更模板（创建新变更时复制）
change_template:
  name: ""
  status: EXPLORE
  retry_counts:
    EXPLORE: 0
    CREATE: 0
    GATE_REVIEW: 0
    APPLY: 0
    CODE_REVIEW: 0
    TEST: 0
    VERIFY: 0
    SYNC: 0
    ARCHIVE: 0
  created_at: ""
  updated_at: ""
  artifacts:
    requirement_analysis: ""
    solution_design: ""
    gate_review: ""
    proposal: ""
    design: ""
    tasks: ""
    specs: ""
    development: ""
    code_review: ""
    test_report: ""
    verification_report: ""
  summary: ""

# 项目上下文（跨会话保留）
project_context:
  tech_stack: ""
  conventions: ""
  domain: ""
