# 多智能体工作流状态机定义
# 用于 MainOrchestrator 驱动开发生命周期
# 平台无关——编排器从各平台的适配层读取调度方式

version: "1.0"

# ============================================================
# MainOrchestrator 职责边界（最高优先级约束）
# ============================================================
orchestrator_constraints:
  role: "唯一调度者，永不执行者（EXPLORE 和 ARCHIVE 用户确认步骤除外）"
  allowed:
    - 读取文件以了解上下文和状态
    - 更新 project-board.yaml 状态和重试计数
    - 根据状态机转换条件决定路由方向
    - 通过平台工具调度子 Agent（传入 change-name 和上下文）
    - 接收子 Agent 报告，评估转换条件，决定下一阶段
    - 错误处理：根据 error_handling 策略执行回退（重新调度子 Agent 或中止工作流）
    - 向用户汇报工作流状态和阶段完成情况
  forbidden:
    - 编写或修改任何代码文件（.ts, .vue, .js, .css, .html 等）
    - 编写或修改任何规划制品（proposal.md, design.md, tasks.md）
    - 编写或修改任何会话制品（REQ-01, DES-02, GATE-03, DEV-04, CR-05, TEST-06, VERIFY-07）
    - 执行编译、测试、验证等操作命令（ARCHIVE 阶段用户确认后由 MainOrchestrator 执行 sync + archive + worktree 清理）
    - 直接"代劳"任何子 Agent 的工作
    - 对子 Agent 的产出进行"润色"或"补充修改"
  red_lines:
    - rule: "子 Agent 执行失败 → 只能重新调度子 Agent 或中止工作流汇报用户，严禁亲自代劳"
      reason: "MainOrchestrator 不是执行者。代劳会绕过质量闸门、产生未经审查的制品、破坏单一真相源"
      enforcement: "一旦发现 MainOrchestrator 尝试代劳（直接修改文件、运行测试等），立即中止当前操作并向用户报告违规行为"
    - rule: "子 Agent 产出不完整或有问题 → 重新调度同一子 Agent 修复，不得由 MainOrchestrator 补充修改"
      reason: "只有子 Agent 了解其产出上下文，MainOrchestrator 的修改无法被后续子 Agent 追踪和验证"
  exception:
    - stage: EXPLORE
      reason: "需要与用户实时交互澄清需求，子 Agent 无法进行对话"
      scope: "仅限 REQ-01_requirement_analysis.md 和 DES-02_solution_design.md"
      note: "EXPLORE 完成后，MainOrchestrator 回归纯调度角色"
    - stage: ARCHIVE
      reason: "归档需用户最终确认，确认后由 MainOrchestrator 执行实际同步和归档操作"
      scope: "子 Agent 生成交付总结和归档计划 → 用户确认 → MainOrchestrator 执行 specs 同步、归档操作和看板更新（使用归档后新路径）"
      note: "执行同步和归档前必须获得用户的明确确认，不得自动执行"

# ============================================================
# 状态定义
# ============================================================
states:
  - name: EXPLORE
    description: 需求分析与方案探索
    executor: MainOrchestrator（唯一例外：亲自执行，与用户实时交互）
    scheduling: direct_execution
    agent_body: .agents/skills/agent-explore/SKILL.md
    artifacts:
      - REQ-01_requirement_analysis.md
      - DES-02_solution_design.md
    transitions:
      - target: CREATE
        condition: user_confirmed_explore_output
      - target: EXPLORE
        condition: need_more_discussion
    note: 此阶段不使用子 Agent 调度工具，由主 Agent 直接与用户交互。完成后立即回归纯调度角色。

  - name: CREATE
    description: 规划制品生成
    executor: Create Agent（子 Agent）
    scheduling: subagent_via_task
    agent_body: .agents/agents/create-agent.body.md
    artifacts:
      - openspec/changes/<change-name>/proposal.md
      - openspec/changes/<change-name>/design.md
      - openspec/changes/<change-name>/tasks.md
      - openspec/changes/<change-name>/specs/
    transitions:
      - target: GATE_REVIEW
        condition: all_artifacts_ready
      - target: CREATE
        condition: artifacts_incomplete
    max_retries: 3
    orchestrator_note: "MainOrchestrator 仅负责调度和接收报告，不参与制品生成"

  - name: GATE_REVIEW
    description: 8维度闸门审查
    executor: Gate Review Agent（子 Agent）
    scheduling: subagent_via_task
    agent_body: .agents/agents/gate-review-agent.body.md
    artifacts:
      - GATE-03_gate_review.md
    transitions:
      - target: APPLY
        condition: gate_pass
      - target: EXPLORE
        condition: gate_blocked
      - target: CREATE
        condition: gate_conditional_pass
    max_retries: 3
    orchestrator_note: "MainOrchestrator 仅调度 Gate Review Agent，审查工作由子 Agent 独立完成"
    enforcement:
      conditional_pass_must_route_to_create: true
      note: |
        CONDITIONAL_PASS 时的条件项（C-###）必须由 Create Agent 修复。
        MainOrchestrator 严禁自行修改 proposal/design/tasks/specs 等规划制品。
        MainOrchestrator 的唯一职责是将条件项列表作为输入传给 Create Agent，
        由 Create Agent 统一修复所有不一致并重新生成制品，必要时二次 Gate Review。

  - name: APPLY
    description: 代码实现（支持 Wave-based 并行执行）
    executor: Apply Agent × N（子 Agent，按 Wave 并行派发）
    scheduling: subagent_via_parallel_waves
    agent_body: .agents/agents/apply-agent.body.md
    input_artifacts:
      - openspec/changes/<change-name>/proposal.md
      - openspec/changes/<change-name>/design.md
      - openspec/changes/<change-name>/tasks.md
      - openspec/changes/<change-name>/execution-plan.yaml  # 并行调度输入
      - openspec/changes/<change-name>/specs/
      - openspec/changes/<change-name>/session/GATE-03_gate_review.md
    artifacts:
      - openspec/changes/<change-name>/session/DEV-04_development.md
      - openspec/changes/<change-name>/session/DEV-04_G*_development.md  # 每 group 独立记录
    parallel_execution:
      mode: wave_based_dag
      description: |
        1. 读取 execution-plan.yaml → 构建 DAG
        2. 拓扑排序 → 划分 Waves
        3. 每个 Wave 内并行派发 N 个 Apply Agent（每个处理一个 group）
        4. Wave 完成后合并所有 worktree branches
        5. 下一 Wave 从合并后的 base 分支创建新 worktrees
        6. 全部 Waves 完成后派发 FINAL Apply Agent 汇总
      fallback: "若 execution-plan.yaml 不存在或 groups 为空 → 回退单 Agent 串行模式"
      merge_strategy: "每 Wave 完成后 git merge 所有 group branches 到 apply-base，冲突时暂停并上报用户"
    transitions:
      - target: CODE_REVIEW
        condition: all_groups_merged_and_compile_pass
      - target: APPLY
        condition: compile_failed_or_merge_conflict
    max_retries: 3
    orchestrator_note: "MainOrchestrator 仅调度 Apply Agent（可能多个并行），负责 Wave 间合并，禁止自行编写或修改任何代码"

  - name: CODE_REVIEW
    description: 代码评审
    executor: Code Review Agent（子 Agent）
    scheduling: subagent_via_task
    agent_body: .agents/agents/code-review-agent.body.md
    artifacts:
      - CR-05_code_review.md
    transitions:
      - target: TEST
        condition: review_pass_or_suggest_only
      - target: APPLY
        condition: has_must_fix
    max_retries: 3
    orchestrator_note: "MainOrchestrator 仅调度 Code Review Agent，评审结论由子 Agent 独立做出"

  - name: TEST
    description: 测试验证
    executor: Test Agent（子 Agent）
    scheduling: subagent_via_task
    agent_body: .agents/agents/test-agent.body.md
    artifacts:
      - TEST-06_test_report.md
    transitions:
      - target: VERIFY
        condition: all_tests_pass
      - target: APPLY
        condition: has_blocking_defect
    max_retries: 3
    orchestrator_note: "MainOrchestrator 仅调度 Test Agent，禁止自行运行测试或修改测试代码"

  - name: VERIFY
    description: 完整验证
    executor: Verify Agent（子 Agent）
    scheduling: subagent_via_task
    agent_body: .agents/agents/verify-agent.body.md
    artifacts:
      - VERIFY-07_verification_report.md
    transitions:
      - target: ARCHIVE
        condition: zero_fail
      - target: APPLY
        condition: has_fail
    max_retries: 3
    orchestrator_note: "MainOrchestrator 仅调度 Verify Agent，验证工作由子 Agent 独立完成"

  - name: ARCHIVE
    description: 变更归档（Archive Agent 生成总结 → 用户确认 → MainOrchestrator 执行 specs 同步 + 归档 + worktree 清理 + 看板更新）
    executor: Archive Agent + MainOrchestrator
    scheduling: hybrid
    workflow:
      - step: 1
        actor: Archive Agent（通过子 Agent 调度）
        action: 归档前检查 + 生成交付总结 DELIVERY_SUMMARY.md
      - step: 2
        actor: MainOrchestrator
        action: 展示交付总结 → 等待用户确认
      - step: 3
        actor: MainOrchestrator（亲自执行，用户确认后）
        action: |
          1. delta specs 同步到主规格库（openspec sync）
          2. openspec archive 归档变更
          3. 更新 project-board.yaml，指向归档后路径 openspec/changes/archive/<change-name>/
          4. 清理 .claude/worktrees/ 残留 worktree
    agent_body: .agents/agents/archive-agent.body.md
    artifacts:
      - openspec/changes/archive/<change-name>/
      - openspec/changes/<change-name>/session/DELIVERY_SUMMARY.md
    transitions:
      - target: COMPLETE
        condition: user_confirmed_and_archive_success
    max_retries: 3
    orchestrator_note: "Archive Agent 生成总结 → 用户确认后 → MainOrchestrator 亲自执行 specs 同步与变更归档"

  - name: COMPLETE
    description: 工作流完成（终端状态，无子 Agent）
    scheduling: terminal
    terminal: true

# 闸门审查的8个维度
gate_dimensions:
  - scope_clarity: 范围是否清晰定义
  - requirement_integrity: 需求是否完整覆盖
  - design_feasibility: 设计是否技术上可行
  - architecture_alignment: 架构是否与现有系统对齐
  - risk_assessment: 风险是否识别并缓解
  - task_completeness: 任务拆分是否可执行
  - spec_compliance: 规格文档是否完整
  - rollback_plan: 回滚/回退方案是否就绪

# 错误处理策略
# 核心原则：子 Agent 失败 → 重新调度子 Agent 或中止工作流，MainOrchestrator 严禁代劳
error_handling:
  subagent_failure_policy:
    description: "任何子 Agent 执行失败时的唯一处理方式"
    options:
      - action: re_dispatch
        description: "重新调度同一子 Agent（修复问题后重试），保留上下文和失败原因"
        max_retries_per_stage: 3
      - action: abort_workflow
        description: "暂停工作流，向用户汇报失败原因、已尝试次数，等待人工决策"
    forbidden_action: "MainOrchestrator 亲自代劳（修改文件、运行命令、补充产出）—— 这是红线违规，触发工作流中止"
  compile_failure:
    action: retry
    max_auto_retries: 3
    on_exhausted: re_dispatch_or_abort
  merge_conflict:
    action: pause_and_report
    description: "Wave 内 groups 合并时发生冲突 → 暂停，向用户报告冲突文件和 groups，等待人工解决"
    on_resolution: continue_next_wave_or_abort
  gate_blocked:
    action: rollback_to_explore
  review_must_fix:
    action: rollback_to_apply
  test_blocking_defect:
    action: rollback_to_apply
  verify_fail:
    action: rollback_to_apply

# Agent body 文件路径映射（编排器根据阶段读取对应的指令体）
agent_body_map:
  EXPLORE: .agents/skills/agent-explore/SKILL.md
  CREATE: .agents/agents/create-agent.body.md
  GATE_REVIEW: .agents/agents/gate-review-agent.body.md
  APPLY: .agents/agents/apply-agent.body.md
  CODE_REVIEW: .agents/agents/code-review-agent.body.md
  TEST: .agents/agents/test-agent.body.md
  VERIFY: .agents/agents/verify-agent.body.md
  ARCHIVE: .agents/agents/archive-agent.body.md
