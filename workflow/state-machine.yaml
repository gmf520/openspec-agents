# 多智能体工作流状态机定义
# 用于 MainOrchestrator 驱动开发生命周期

version: "1.0"

states:
  - name: EXPLORE
    description: 需求分析与方案探索（主 Agent 直接执行，非 Task 子 Agent）
    executor: MainOrchestrator（亲自执行，与用户实时交互）
    skill: agent-explore（作为探索立场参考）
    artifacts:
      - REQ-01_requirement_analysis.md
      - DES-02_solution_design.md
    transitions:
      - target: CREATE
        condition: user_confirmed_explore_output
      - target: EXPLORE
        condition: need_more_discussion
    note: 此阶段不使用 Task 工具，由主 Agent 直接与用户交互

  - name: CREATE
    description: 规划制品生成
    agent: Create Agent
    skill: agent-create
    artifacts:
      - openspec/changes/<change-name>/proposal.md
      - openspec/changes/<change-name>/design.md
      - openspec/changes/<change-name>/tasks.md
      - openspec/changes/<change-name>/specs/
    transitions:
      - target: GATE_REVIEW
        condition: all_artifacts_ready
      - target: CREATE
        condition: artifacts_incomplete
    max_retries: 3

  - name: GATE_REVIEW
    description: 8维度闸门审查
    agent: Gate Review Agent
    skill: agent-gate-review
    artifacts:
      - GATE-03_gate_review.md
    transitions:
      - target: APPLY
        condition: gate_pass
      - target: EXPLORE
        condition: gate_blocked
      - target: CREATE
        condition: gate_conditional_pass
    max_retries: 3

  - name: APPLY
    description: 代码实现
    agent: Apply Agent
    skill: agent-apply
    artifacts:
      - DEV-04_development.md
    transitions:
      - target: CODE_REVIEW
        condition: all_tasks_done_and_compile_pass
      - target: APPLY
        condition: compile_failed
    max_retries: 3

  - name: CODE_REVIEW
    description: 代码评审
    agent: Code Review Agent
    skill: agent-code-review
    artifacts:
      - CR-05_code_review.md
    transitions:
      - target: TEST
        condition: review_pass_or_suggest_only
      - target: APPLY
        condition: has_must_fix
    max_retries: 3

  - name: TEST
    description: 测试验证
    agent: Test Agent
    skill: agent-test
    artifacts:
      - TEST-06_test_report.md
    transitions:
      - target: VERIFY
        condition: all_tests_pass
      - target: APPLY
        condition: has_blocking_defect
    max_retries: 3

  - name: VERIFY
    description: 完整验证
    agent: Verify Agent
    skill: agent-verify
    artifacts:
      - VERIFY-07_verification_report.md
    transitions:
      - target: SYNC
        condition: zero_fail
      - target: APPLY
        condition: has_fail
    max_retries: 3

  - name: SYNC
    description: 规格同步
    agent: Sync Agent
    skill: agent-sync
    artifacts:
      - openspec/specs/
    transitions:
      - target: ARCHIVE
        condition: sync_success
      - target: APPLY
        condition: sync_conflict
    max_retries: 3

  - name: ARCHIVE
    description: 变更归档
    agent: Archive Agent
    skill: agent-archive
    artifacts:
      - openspec/changes/archive/<change-name>/
    transitions:
      - target: COMPLETE
        condition: archive_success
    max_retries: 3

  - name: COMPLETE
    description: 工作流完成
    terminal: true

# 闸门审查的8个维度
gate_dimensions:
  - scope_clarity: 范围是否清晰定义
  - requirement_integrity: 需求是否完整覆盖
  - design_feasibility: 设计是否技术上可行
  - architecture_alignment: 架构是否与现有系统对齐
  - risk_assessment: 风险是否识别并缓解
  - task_completeness: 任务拆分是否可执行
  - spec_compliance: 规格文档是否完整
  - rollback_plan: 回滚/回退方案是否就绪

# 错误处理策略
error_handling:
  compile_failure:
    action: retry
    max_auto_retries: 3
    on_exhausted: report_to_human
  gate_blocked:
    action: rollback_to_explore
  review_must_fix:
    action: rollback_to_apply
  test_blocking_defect:
    action: rollback_to_apply
  verify_fail:
    action: rollback_to_apply
  sync_conflict:
    action: rollback_to_apply
